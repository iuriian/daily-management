name: CI

on:
  push:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-android
      - run: ./gradlew lint

  unit_test:
    name: Unit Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: ./.github/actions/setup-android

      - run: ./gradlew test

  build:
    name: Build check
    runs-on: ubuntu-latest
    needs: unit_test

    steps:
      - uses: ./.github/actions/setup-android

      - run: ./gradlew assembleDebug